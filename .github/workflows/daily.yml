name: Daily ANVISA collector

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m src.cli run-daily
      - run: |
          git config user.name "inteligreg-bot"
          git config user.email "bot@inteligreg.local"
          git add data/normas.csv data/url.env data/urls_anvisa.txt
          git commit -m "Atualiza normas ANVISA" || echo "Sem alterações para commit"
          git push
